name: BLACKS Cron Jobs

on:
  schedule:
    # Sync de catálogo Tiendanube (precios/stock) a las 09:45 UTC (06:45 ARG)
    - cron: '45 9 * * *'
    # Generación diaria de copy + imagen a las 10:00 UTC (07:00 ARG)
    - cron: '0 10 * * *'
    # Backfill de video de Reels pendientes cada 30 min (corre en el runner, no en Render)
    - cron: '*/30 * * * *'
    # Publicación: pasada horaria liviana (~10 seg). Encola lo aprobado del día y
    # publica cada pieza cuando llega SU horario programado (hora argentina).
    # Ventana 10:00-23:00 UTC = 07:00-20:00 ARG (fuera de eso no hay slots).
    - cron: '0 10-23 * * *'
    # Sincronización semanal de métricas e insights los lunes a las 12:00 UTC
    - cron: '0 12 * * 1'
    # Datos verificados de la empresa (web oficial -> IA): domingos 11:00 UTC
    - cron: '0 11 * * 0'
    # Análisis de estilo automático cada 48 h (06:00 UTC / 03:00 ARG)
    - cron: '0 6 */2 * *'
    # Plan mensual IA: el día 25 deja armado el plan del mes siguiente (12:00 UTC)
    - cron: '0 12 25 * *'
  workflow_dispatch:
    inputs:
      job:
        description: 'Elegí la tarea a ejecutar manualmente'
        required: true
        default: 'generate-daily'
        type: choice
        options:
          - sync-products
          - generate-daily
          - render-reels
          - publish-daily
          - sync-insights
          - analyze-style
          - generate-plan
          - sync-company-info

jobs:
  # Trae precios/stock actualizados de Tiendanube al cache.
  sync-products:
    if: github.event.schedule == '45 9 * * *' || github.event.inputs.job == 'sync-products'
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      TIENDANUBE_STORE_ID: ${{ secrets.TIENDANUBE_STORE_ID }}
      TIENDANUBE_ACCESS_TOKEN: ${{ secrets.TIENDANUBE_ACCESS_TOKEN }}
      TIENDANUBE_USER_AGENT: ${{ secrets.TIENDANUBE_USER_AGENT }}
      TIENDANUBE_AUTH_HEADER_STYLE: ${{ secrets.TIENDANUBE_AUTH_HEADER_STYLE }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run sync
      - run: npm run sync:sales
      # Con el stock fresco en el cache, corrige la disponibilidad del catálogo de
      # Meta (variantes que figuran sin stock pero tienen, y al revés) para que los
      # anuncios dinámicos muestren los productos correctos. Best-effort: si falla,
      # no bloquea el sync (queda para la próxima corrida).
      - name: Sincronizar catálogo de Meta con el stock real
        run: |
          curl -sf -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            "${{ secrets.PUBLIC_BASE_URL }}/api/cron/sync-catalog" \
            || echo "sync-catalog falló (no bloquea el sync de productos)"

  # Genera copy + imagen (Puppeteer/Gemini) en el runner de GitHub (no en Render)
  # para no competir por la RAM del free tier.
  generate-daily:
    if: github.event.schedule == '0 10 * * *' || github.event.inputs.job == 'generate-daily'
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SUPABASE_STORAGE_BUCKET: ${{ secrets.SUPABASE_STORAGE_BUCKET }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      AI_IMAGES: ${{ secrets.AI_IMAGES }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      PUBLIC_BASE_URL: ${{ secrets.PUBLIC_BASE_URL }}
      TIENDANUBE_STORE_ID: ${{ secrets.TIENDANUBE_STORE_ID }}
      TIENDANUBE_ACCESS_TOKEN: ${{ secrets.TIENDANUBE_ACCESS_TOKEN }}
      TIENDANUBE_USER_AGENT: ${{ secrets.TIENDANUBE_USER_AGENT }}
      TIENDANUBE_AUTH_HEADER_STYLE: ${{ secrets.TIENDANUBE_AUTH_HEADER_STYLE }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run generate:daily
      - run: npm run render:reels

  # Chequeo liviano (~10 seg) para no gastar minutos de Actions instalando todo
  # cuando no hay ningún video pendiente de renderizar.
  check-pending-renders:
    if: github.event.schedule == '*/30 * * * *' || github.event.inputs.job == 'render-reels'
    runs-on: ubuntu-latest
    outputs:
      pending: ${{ steps.check.outputs.pending }}
    steps:
      - name: Consultar si hay renders pendientes
        id: check
        run: |
          PENDING=$(curl -sf \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.PUBLIC_BASE_URL }}/api/cron/has-pending-renders" \
            | grep -o '"pending":[a-z]*' | cut -d: -f2 || echo "true")
          echo "pending=$PENDING" >> "$GITHUB_OUTPUT"
          echo "Renders pendientes: $PENDING"

  # Renderiza con ffmpeg el video de los Reels que todavía no lo tienen.
  render-reels:
    needs: check-pending-renders
    if: needs.check-pending-renders.outputs.pending == 'true' || github.event.inputs.job == 'render-reels'
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SUPABASE_STORAGE_BUCKET: ${{ secrets.SUPABASE_STORAGE_BUCKET }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: sudo apt-get update && sudo apt-get install -y fonts-dejavu-core fontconfig
      - run: npm ci
      - run: npm run render:reels
      - run: npm run render:edits

  # Publicación y sync de insights son llamadas livianas a Meta: se quedan en Render.
  publish-daily:
    if: github.event.schedule == '0 10-23 * * *' || github.event.inputs.job == 'publish-daily'
    runs-on: ubuntu-latest
    steps:
      - name: Llamar al endpoint de publicación
        run: |
          curl -sf -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            "${{ secrets.PUBLIC_BASE_URL }}/api/cron/publish-daily"

  sync-insights:
    if: github.event.schedule == '0 12 * * 1' || github.event.inputs.job == 'sync-insights'
    runs-on: ubuntu-latest
    steps:
      - name: Llamar al endpoint de insights
        run: |
          curl -sf -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            "${{ secrets.PUBLIC_BASE_URL }}/api/cron/sync-insights"

  # Plan mensual IA (liviano: una llamada a Gemini/Groq desde Render).
  generate-plan:
    if: github.event.schedule == '0 12 25 * *' || github.event.inputs.job == 'generate-plan'
    runs-on: ubuntu-latest
    steps:
      - name: Generar plan del mes siguiente
        run: |
          curl -sf -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            "${{ secrets.PUBLIC_BASE_URL }}/api/cron/generate-plan"

  # Datos verificados de la empresa: lee la web oficial y sintetiza con IA (liviano:
  # fetch + una llamada a Gemini desde Render). Mantiene company_facts al día.
  sync-company-info:
    if: github.event.schedule == '0 11 * * 0' || github.event.inputs.job == 'sync-company-info'
    runs-on: ubuntu-latest
    steps:
      - name: Refrescar datos de la empresa
        run: |
          curl -sf -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            "${{ secrets.PUBLIC_BASE_URL }}/api/cron/sync-company-info"

  # Análisis de estilo automático cada 48 h (piezas + cuenta -> brand_profile).
  analyze-style:
    if: github.event.schedule == '0 6 */2 * *' || github.event.inputs.job == 'analyze-style'
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SUPABASE_STORAGE_BUCKET: ${{ secrets.SUPABASE_STORAGE_BUCKET }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      META_PAGE_ACCESS_TOKEN: ${{ secrets.META_PAGE_ACCESS_TOKEN }}
      IG_USER_ID: ${{ secrets.IG_USER_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run analyze:style
