<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BLACKS — Ingresar</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0A0A0A; color: #FFFFFF;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }
    .card {
      width: 100%; max-width: 380px; background: #151515;
      border: 1px solid #2a2a2a; border-radius: 16px; padding: 36px 28px;
    }
    .logo { font-size: 28px; font-weight: 800; letter-spacing: 4px; text-align: center; }
    .logo span { color: #C1440C; }
    .sub { text-align: center; color: #888; font-size: 13px; margin: 8px 0 28px; }
    label { display: block; font-size: 13px; color: #aaa; margin-bottom: 8px; }
    input {
      width: 100%; padding: 12px 14px; border-radius: 10px;
      border: 1px solid #333; background: #0A0A0A; color: #fff; font-size: 16px;
    }
    input:focus { outline: none; border-color: #C1440C; }
    button {
      width: 100%; margin-top: 18px; padding: 13px; border: none; border-radius: 10px;
      background: #C1440C; color: #fff; font-size: 15px; font-weight: 700; cursor: pointer;
    }
    button:hover { background: #d9530f; }
    button:disabled { opacity: 0.6; cursor: wait; }
    .error { color: #ff6b5e; font-size: 13px; margin-top: 12px; text-align: center; min-height: 18px; }
  </style>
</head>
<body>
  <form class="card" id="form">
    <div class="logo">BLACK<span>S</span></div>
    <div class="sub">Panel de contenido</div>
    <label for="password">Contraseña</label>
    <input type="password" id="password" autocomplete="current-password" autofocus required />
    <button type="submit" id="btn">Ingresar</button>
    <div class="error" id="error"></div>
  </form>
  <script>
    document.getElementById('form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('btn');
      const errorEl = document.getElementById('error');
      btn.disabled = true; errorEl.textContent = '';
      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: document.getElementById('password').value }),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || 'Error ' + res.status);
        window.location.href = '/';
      } catch (err) {
        errorEl.textContent = err.message;
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
